name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - uses: nrwl/nx-set-shas@v4

      - run: npx nx affected -t lint test build typecheck e2e

      - name: Upload Playwright test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-output
          path: apps/cli-e2e/test-output
          if-no-files-found: ignore
          retention-days: 7
